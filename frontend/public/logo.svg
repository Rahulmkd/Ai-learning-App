<svg viewBox="0 0 500 540" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#eef2ff"/><stop offset="100%" stop-color="#e0e7ff"/>
    </radialGradient>
    <linearGradient id="shieldG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3730a3"/><stop offset="50%" stop-color="#4338ca"/><stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="shieldSheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/><stop offset="50%" stop-color="#ffffff" stop-opacity="0.04"/><stop offset="100%" stop-color="#000000" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="ringG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/><stop offset="33%" stop-color="#4338ca"/><stop offset="66%" stop-color="#818cf8"/><stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="wordG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3730a3"/><stop offset="50%" stop-color="#4f46e5"/><stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>
    <radialGradient id="haloG" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.18"/><stop offset="100%" stop-color="#4338ca" stop-opacity="0"/>
    </radialGradient>
    <filter id="bloom" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="14"/>
    </filter>
    <filter id="nodeBloom" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softBloom" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow" x="-15%" y="-50%" width="130%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shieldShadow" x="-20%" y="-10%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12"/>
    </filter>
  </defs>

  <circle cx="250" cy="248" r="242" fill="url(#bg)"/>
  <circle cx="250" cy="230" r="155" fill="#4338ca" opacity="0.06" filter="url(#bloom)"/>
  <circle cx="250" cy="248" r="234" fill="none" stroke="url(#ringG)" stroke-width="2.5" opacity="0.8"/>
  <circle cx="250" cy="248" r="221" fill="none" stroke="#6366f1" stroke-width="0.6" opacity="0.3"/>
  <circle cx="250" cy="248" r="209" fill="none" stroke="#4338ca" stroke-width="0.6" stroke-dasharray="4 13" opacity="0.22"/>

  <ellipse cx="250" cy="260" rx="148" ry="158" fill="url(#haloG)" filter="url(#bloom)"/>
  <path d="M250,113 L371,161 L371,291 Q371,361 250,401 Q129,361 129,291 L129,161 Z" fill="#4338ca" opacity="0.14" filter="url(#shieldShadow)"/>
  <path d="M250,108 L372,158 L372,290 Q372,362 250,402 Q128,362 128,290 L128,158 Z" fill="url(#shieldG)"/>
  <path d="M250,108 L372,158 L372,290 Q372,362 250,402 Q128,362 128,290 L128,158 Z" fill="url(#shieldSheen)"/>
