  <line x1="331" y1="251" x2="360" y2="251" stroke="#a5b4fc" stroke-width="1.3" opacity="0.7"/>
  <line x1="331" y1="251" x2="352" y2="278" stroke="#a5b4fc" stroke-width="1.3" opacity="0.7"/>
