  <line x1="331" y1="251" x2="302" y2="251" stroke="#a5b4fc" stroke-width="1.3" opacity="0.7"/>
  <circle cx="311" cy="222" r="5"   fill="#6366f1" filter="url(#nodeBloom)"/>
  <circle cx="352" cy="220" r="4.5" fill="#818cf8" filter="url(#nodeBloom)"/>
  <circle cx="360" cy="251" r="4.5" fill="#6366f1" filter="url(#nodeBloom)"/>
  <circle cx="352" cy="278" r="5"   fill="#818cf8" filter="url(#nodeBloom)"/>
