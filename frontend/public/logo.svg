  <text x="199" y="274" text-anchor="middle" font-size="8.5" font-weight="800" fill="#e0e7ff">PDF</text>

  <line x1="256" y1="251" x2="281" y2="251" stroke="#a5b4fc" stroke-width="2.8" stroke-linecap="round"/>
  <polygon points="279,245 291,251 279,257" fill="#a5b4fc"/>
  <circle cx="263" cy="239" r="2.2" fill="#818cf8" opacity="0.9"/>
  <circle cx="273" cy="235" r="1.6" fill="#c7d2fe"/>

  <circle cx="331" cy="251" r="8"   fill="#e0e7ff" opacity="0.95" filter="url(#nodeBloom)"/>
  <circle cx="331" cy="251" r="3.5" fill="#ffffff"/>
  <line x1="331" y1="251" x2="311" y2="222" stroke="#a5b4fc" stroke-width="1.3" opacity="0.7"/>
