  <circle cx="302" cy="251" r="4.5" fill="#818cf8" filter="url(#nodeBloom)"/>

  <rect x="155" y="312" width="62" height="20" rx="10" fill="#3730a3" fill-opacity="0.88"/>
  <text x="186" y="325" text-anchor="middle" font-size="9" font-weight="700" fill="#e0e7ff">Summary</text>
  <rect x="223" y="312" width="48" height="20" rx="10" fill="#4338ca" fill-opacity="0.88"/>
  <text x="247" y="325" text-anchor="middle" font-size="9" font-weight="700" fill="#eef2ff">Quiz</text>
  <rect x="277" y="312" width="72" height="20" rx="10" fill="#4f46e5" fill-opacity="0.88"/>
  <text x="313" y="325" text-anchor="middle" font-size="9" font-weight="700" fill="#e0e7ff">Flashcards</text>

  <g filter="url(#softBloom)">
    <line x1="250" y1="94"  x2="250" y2="122" stroke="#6366f1" stroke-width="2"   stroke-linecap="round"/>
    <line x1="236" y1="108" x2="264" y2="108" stroke="#6366f1" stroke-width="2"   stroke-linecap="round"/>
    <line x1="240" y1="98"  x2="260" y2="118" stroke="#818cf8" stroke-width="1.4" stroke-linecap="round" opacity="0.7"/>
    <line x1="260" y1="98"  x2="240" y2="118" stroke="#818cf8" stroke-width="1.4" stroke-linecap="round" opacity="0.7"/>
    <circle cx="250" cy="108" r="4.5" fill="#4338ca" opacity="0.95"/>
    <circle cx="250" cy="108" r="2"   fill="#ffffff"/>
  </g>

  <text x="250" y="466" text-anchor="middle" font-size="30" font-weight="800" letter-spacing="4" fill="url(#wordG)" filter="url(#textGlow)">AI LEARNING</text>
  <text x="250" y="493" text-anchor="middle" font-size="12" font-weight="600" letter-spacing="9" fill="#4338ca" opacity="0.65">PLATFORM</text>
  <line x1="178" y1="504" x2="322" y2="504" stroke="url(#ringG)" stroke-width="1.2" opacity="0.4" stroke-linecap="round"/>
